<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>注册 - CampusTrade</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/app.css" rel="stylesheet">
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom">
    <div class="container">
      <a class="navbar-brand fw-bold text-success" href="/pages/index.html">CampusTrade</a>
      <div class="d-flex align-items-center gap-2" data-auth-nav></div>
    </div>
  </nav>

  <main class="container py-5">
    <div class="auth-card mx-auto">
      <h1 class="h3 fw-bold mb-4">创建账号</h1>
      <form id="register-form">
        <div class="mb-3">
          <label class="form-label" for="username">用户名</label>
          <input class="form-control" id="username" name="username" maxlength="50" required>
        </div>
        <div class="mb-3">
          <label class="form-label" for="email">邮箱</label>
          <input class="form-control" id="email" name="email" type="email" maxlength="100" required>
        </div>
        <div class="mb-3">
          <label class="form-label" for="phone">手机号（可选）</label>
          <input class="form-control" id="phone" name="phone" maxlength="30">
        </div>
        <div class="mb-3">
          <label class="form-label" for="password">密码</label>
          <input class="form-control" id="password" name="password" type="password" minlength="6" required>
        </div>
        <div class="mb-3">
          <label class="form-label" for="confirmPassword">确认密码</label>
          <input class="form-control" id="confirmPassword" name="confirmPassword" type="password" minlength="6" required>
        </div>
        <div id="register-message" class="form-message mb-3"></div>
        <button class="btn btn-success w-100" type="submit">注册</button>
      </form>
      <p class="text-center text-secondary mt-3 mb-0">已有账号？<a href="/pages/login.html">去登录</a></p>
    </div>
  </main>

  <script src="/js/api.js"></script>
  <script src="/js/register.js"></script>
</body>
</html>
