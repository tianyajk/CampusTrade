<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>用户主页 - CampusTrade</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/app.css" rel="stylesheet">
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom">
    <div class="container">
      <a class="navbar-brand fw-bold text-success" href="/pages/index.html">CampusTrade</a>
      <div class="d-flex align-items-center gap-2" data-auth-nav></div>
    </div>
  </nav>

  <main class="container py-5">
    <div id="user-message" class="text-danger mb-3"></div>
    <section class="profile-card mb-4">
      <div class="d-flex flex-column flex-md-row align-items-center gap-4">
        <img id="user-avatar" class="avatar-preview" src="/assets/default-avatar.svg" alt="用户头像">
        <div>
          <h1 id="user-name" class="h3 fw-bold">用户主页</h1>
          <p class="text-secondary mb-1">邮箱：<span id="user-email"></span></p>
          <p class="text-secondary mb-1">手机号：<span id="user-phone"></span></p>
          <p class="text-secondary mb-0">注册时间：<span id="user-created"></span></p>
        </div>
      </div>
    </section>

    <section>
      <h2 class="h4 fw-bold mb-3">发布的商品</h2>
      <div id="user-products" class="row g-3"></div>
    </section>
  </main>

  <script src="/js/api.js"></script>
  <script src="/js/user.js"></script>
</body>
</html>
