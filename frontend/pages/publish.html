<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>发布商品 - CampusTrade</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/app.css" rel="stylesheet">
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom">
    <div class="container">
      <a class="navbar-brand fw-bold text-success" href="/pages/index.html">CampusTrade</a>
      <div class="d-flex align-items-center gap-2">
        <a class="nav-link" href="/pages/products.html">商品列表</a>
        <div class="d-flex align-items-center gap-2" data-auth-nav></div>
      </div>
    </div>
  </nav>

  <main class="container py-5">
    <section class="profile-card mx-auto product-form-card">
      <h1 id="page-title" class="h3 fw-bold mb-4">发布商品</h1>
      <form id="product-form">
        <div class="mb-3">
          <label class="form-label" for="title">商品标题</label>
          <input class="form-control" id="title" name="title" maxlength="100" required>
        </div>
        <div class="mb-3">
          <label class="form-label" for="description">商品描述</label>
          <textarea class="form-control" id="description" name="description" rows="5" maxlength="1000" required></textarea>
        </div>
        <div class="mb-3">
          <label class="form-label" for="price">价格</label>
          <input class="form-control" id="price" name="price" type="number" min="0.01" max="999999.99" step="0.01" required>
        </div>
        <div class="mb-3">
          <label class="form-label" for="category">分类</label>
          <select class="form-select" id="category" name="category" required>
            <option value="">请选择分类</option>
            <option value="教材">教材</option>
            <option value="电子产品">电子产品</option>
            <option value="生活用品">生活用品</option>
            <option value="服饰">服饰</option>
            <option value="运动户外">运动户外</option>
            <option value="其他">其他</option>
          </select>
        </div>
        <div class="mb-3">
          <label class="form-label" for="imageFile">商品图片（可选）</label>
          <input class="form-control" id="imageFile" name="imageFile" type="file" accept="image/*">
          <img id="image-preview" class="upload-preview mt-2 d-none" alt="图片预览">
        </div>
        <div id="product-form-message" class="form-message mb-3"></div>
        <div class="d-flex gap-2">
          <button id="submit-button" class="btn btn-success" type="submit">发布商品</button>
          <a class="btn btn-outline-secondary" href="/pages/products.html">取消</a>
        </div>
      </form>
    </section>
  </main>

  <script src="/js/api.js"></script>
  <script src="/js/publish.js"></script>
</body>
</html>
