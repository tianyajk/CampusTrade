<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>商品列表 - CampusTrade</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/app.css" rel="stylesheet">
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom">
    <div class="container">
      <a class="navbar-brand fw-bold text-success" href="/pages/index.html">CampusTrade</a>
      <div class="d-flex align-items-center gap-2">
        <a class="btn btn-sm btn-success" href="/pages/publish.html">发布商品</a>
        <div class="d-flex align-items-center gap-2" data-auth-nav></div>
      </div>
    </div>
  </nav>

  <main class="container py-5">
    <div class="d-flex flex-wrap justify-content-between align-items-center gap-3 mb-4">
      <div>
        <h1 class="h3 fw-bold mb-1">商品列表</h1>
        <p class="text-secondary mb-0">浏览校园里的二手好物，支持关键词搜索和分类筛选。</p>
      </div>
      <a class="btn btn-outline-success" href="/pages/publish.html">我要发布</a>
    </div>

    <section class="profile-card mb-4">
      <form id="search-form" class="row g-3 align-items-center">
        <div class="col-md-9">
          <input id="keyword" class="form-control" maxlength="100" placeholder="搜索商品标题，例如：教材、耳机、自行车">
        </div>
        <div class="col-md-3 d-grid">
          <button class="btn btn-success" type="submit">搜索</button>
        </div>
      </form>
      <div id="category-filters" class="d-flex flex-wrap gap-2 mt-3"></div>
    </section>

    <div id="product-message" class="form-message mb-3"></div>
    <div id="product-grid" class="row g-4"></div>
    <nav class="product-pagination mt-4" aria-label="商品分页">
      <ul id="pagination" class="pagination justify-content-center"></ul>
    </nav>
  </main>

  <script src="/js/api.js"></script>
  <script src="/js/products.js"></script>
</body>
</html>
