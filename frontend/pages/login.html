<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>登录 - CampusTrade</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/app.css" rel="stylesheet">
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom">
    <div class="container">
      <a class="navbar-brand fw-bold text-success" href="/pages/index.html">CampusTrade</a>
      <div class="d-flex align-items-center gap-2" data-auth-nav></div>
    </div>
  </nav>

  <main class="container py-5">
    <div class="auth-card mx-auto">
      <h1 class="h3 fw-bold mb-4">用户登录</h1>
      <form id="login-form">
        <div class="mb-3">
          <label class="form-label" for="account">用户名或邮箱</label>
          <input class="form-control" id="account" name="account" autocomplete="username" required>
        </div>
        <div class="mb-3">
          <label class="form-label" for="password">密码</label>
          <input class="form-control" id="password" name="password" type="password" autocomplete="current-password" required>
        </div>
        <div id="login-message" class="form-message mb-3"></div>
        <button class="btn btn-success w-100" type="submit">登录</button>
      </form>
      <p class="text-center text-secondary mt-3 mb-0">还没有账号？<a href="/pages/register.html">去注册</a></p>
    </div>
  </main>

  <script src="/js/api.js"></script>
  <script src="/js/login.js"></script>
</body>
</html>
