<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>个人中心 - CampusTrade</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/app.css" rel="stylesheet">
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom">
    <div class="container">
      <a class="navbar-brand fw-bold text-success" href="/pages/index.html">CampusTrade</a>
      <div class="d-flex align-items-center gap-2" data-auth-nav></div>
    </div>
  </nav>

  <main class="container py-5">
    <div class="row g-4">
      <div class="col-lg-4">
        <section class="profile-card text-center">
          <img id="avatar-preview" class="avatar-preview mb-3" src="/assets/default-avatar.svg" alt="头像">
          <h1 id="profile-username" class="h4 fw-bold">加载中...</h1>
          <p id="profile-email" class="text-secondary mb-1"></p>
          <p class="text-secondary mb-1">手机号：<span id="profile-phone"></span></p>
          <p class="text-secondary mb-0">注册时间：<span id="profile-created"></span></p>
        </section>

        <section class="profile-card mt-4">
          <h2 class="h5 fw-bold mb-3">上传头像</h2>
          <form id="avatar-form">
            <input class="form-control mb-3" name="file" type="file" accept="image/*" required>
            <div id="avatar-message" class="form-message mb-3"></div>
            <button class="btn btn-outline-success w-100" type="submit">上传头像</button>
          </form>
        </section>
      </div>

      <div class="col-lg-8">
        <section class="profile-card">
          <h2 class="h4 fw-bold mb-4">修改个人信息</h2>
          <form id="profile-form">
            <div class="mb-3">
              <label class="form-label" for="username">用户名</label>
              <input class="form-control" id="username" name="username" maxlength="50" required>
            </div>
            <div class="mb-3">
              <label class="form-label" for="email">邮箱</label>
              <input class="form-control" id="email" name="email" type="email" maxlength="100" required>
            </div>
            <div class="mb-3">
              <label class="form-label" for="phone">手机号</label>
              <input class="form-control" id="phone" name="phone" maxlength="30">
            </div>
            <div id="profile-message" class="form-message mb-3"></div>
            <button class="btn btn-success" type="submit">保存修改</button>
          </form>
        </section>
      </div>
    </div>
  </main>

  <script src="/js/api.js"></script>
  <script src="/js/profile.js"></script>
</body>
</html>
